name: Update FlySafair Flights

on:
  schedule:
    # Hourly runs from 03:00–22:00 UTC (05:00–00:00 SAST).
    # FlySafair operates 05:45–22:40 SAST; settlement buffer is 1 hour after arrival.
    #
    # Full runs (past + future flights, 6 API calls) at 03:00, 12:00, 21:00 UTC.
    # Settlement-only runs (past flights only, 3 API calls) at all other hours.
    #
    # API budget (tier 2 = 2 credits/call, 6,000 credits/month):
    #   Full runs:       3/day × 6 calls × 2 credits =  36 credits/day
    #   Settlement runs: 17/day × 3 calls × 2 credits = 102 credits/day
    #   Total: 138 credits/day × 31 days = 4,278 credits/month (71% of budget)
    #
    # Avg settlement wait ≈ 1.5 h (1 h buffer + 0.5 h avg until next run).
    # Max settlement wait ≈ 2 h (1 h buffer + 1 h until next run).
    - cron: '0 3-22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Determine run mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run — full mode"
            echo "SETTLEMENT_ONLY=false" >> $GITHUB_ENV
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "03" ] || [ "$HOUR" = "12" ] || [ "$HOUR" = "21" ]; then
              echo "Full run (past + future flights)"
              echo "SETTLEMENT_ONLY=false" >> $GITHUB_ENV
            else
              echo "Settlement-only run (past flights only)"
              echo "SETTLEMENT_ONLY=true" >> $GITHUB_ENV
            fi
          fi

      - name: Fetch and update flight data
        run: node src/index.js
        env:
          AERODATABOX_API_KEY: ${{ secrets.AERODATABOX_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          SETTLEMENT_ONLY: ${{ env.SETTLEMENT_ONLY }}

      - name: Settle bets
        run: node src/settle-bets.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "Update FlySafair flight data" && git push)
