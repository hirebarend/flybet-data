name: Update FlySafair Flights

on:
  schedule:
    # Optimized for FlySafair operations: first flight 05:45 SAST, last landing 22:40 SAST.
    # AeroDataBox API returns ±12h window. SAST = UTC+2.
    # 3 runs/day (down from 8) — saves ~62% on API and Actions costs.
    #
    # Run 1: 05:00 SAST (03:00 UTC) — Early run before first flight.
    #   Future window 05:00–17:00 populates morning/afternoon flights for betting.
    #   Settles overnight flights. Updates previous evening actuals.
    - cron: '0 3 * * *'
    # Run 2: 14:00 SAST (12:00 UTC) — Afternoon run.
    #   Future window 14:00–02:00 populates all evening flights (incl. last at 22:40).
    #   Updates morning actuals. Settles morning flights (eligible from ~10:45).
    - cron: '0 12 * * *'
    # Run 3: 23:30 SAST (21:30 UTC) — Final settlement check.
    #   Updates evening actuals. Settles flights landing up to ~20:30.
    #   Future window 23:30–11:30 populates tomorrow's morning flights for overnight betting.
    - cron: '30 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and update flight data
        run: node src/index.js
        env:
          AERODATABOX_API_KEY: ${{ secrets.AERODATABOX_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Settle bets
        run: node src/settle-bets.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "Update FlySafair flight data" && git push)
